{% extends "base.html" %}
{% block title %}Новый договор{% endblock %}
{% block content %}
<h2>Новый договор</h2>
<form method="post" enctype="multipart/form-data">
    <label>Номер: <input type="text" name="number" required></label><br>
    <label>Дата: <input type="date" name="date" required></label><br>
    <label>Сумма: <input type="number" step="0.01" name="amount" required></label><br>
    <label>Заказчик:
        <select name="customer_id">
            {% for c in customers %}
            <option value="{{ c.id }}">{{ c.name }} ({{ "Физ." if c.type == "individual" else "Юр." }})</option>
            {% endfor %}
        </select>
    </label><br>
    <label>Файл договора: <input type="file" name="file" accept=".pdf,.doc,.docx,.jpg,.png"></label><br>
    <button type="submit">Создать</button>
</form>
{% endblock %}
