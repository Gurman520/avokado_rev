{% extends "base.html" %}
{% block title %}Новый чек{% endblock %}
{% block content %}
<h2>Новый чек</h2>
<form method="post" enctype="multipart/form-data">
    <label>Договор:
        <select name="contract_id">
            {% for c in contracts %}
            <option value="{{ c.id }}">{{ c.number }} ({{ c.customer.name if c.customer }})</option>
            {% endfor %}
        </select>
    </label><br>
    <label>Акт (необязательно):
        <select name="act_id">
            <option value="">-- не связан с актом --</option>
            {% for a in acts %}
            <option value="{{ a.id }}">{{ a.number }} от {{ a.date }}</option>
            {% endfor %}
        </select>
    </label><br>
    <label>Дата: <input type="date" name="date" required></label><br>
    <label>Сумма: <input type="number" step="0.01" name="amount" required></label><br>
    <label>Ссылка на чек: <input type="url" name="link" required></label><br>
    <label>Файл: <input type="file" name="file"></label><br>
    <button type="submit">Создать</button>
</form>
{% endblock %}
